name: 构建并推送镜像

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:  # 手动触发

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置镜像名称和标签
      - name: 设置镜像信息
        id: image-info
        run: |
          echo "IMAGE_NAME=check_in_zw_v3" >> $GITHUB_OUTPUT
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/check_in_zw_v3" >> $GITHUB_OUTPUT
          SHA_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "SHA_TAG=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "构建的镜像标签: $SHA_TAG"

      # 3. 登录到 GitHub 容器注册表
      - name: 登录到 GitHub 容器注册表
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 4. 使用 Buildah 构建镜像
      - name: 使用 Buildah 构建镜像
        uses: redhat-actions/buildah-build@v2
        with:
          context: .
          containerfiles: ./Containerfile
          image: ${{ steps.image-info.outputs.GHCR_IMAGE }}
          tags: ${{ steps.image-info.outputs.SHA_TAG }} latest

      # 5. 推送到 GitHub 容器注册表
      - name: 推送到 GitHub 容器注册表
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.image-info.outputs.IMAGE_NAME }}
          tags: ${{ steps.image-info.outputs.SHA_TAG }} latest
          registry: ghcr.io/${{ github.repository_owner }}
